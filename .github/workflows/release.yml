name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: read
  packages: write

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  publish:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4.0.1
      - uses: gradle/actions/setup-gradle@v6.1.0
      - name: Verify release tag
        run: |
          tag_version="${GITHUB_REF_NAME#v}"
          project_version="$(awk -F= '$1 == "VERSION_NAME" { print $2 }' gradle.properties)"
          test "${tag_version}" = "${project_version}"
          if [[ "${project_version}" == *-SNAPSHOT ]]; then
            echo "Release tags must not publish SNAPSHOT versions: ${project_version}" >&2
            exit 1
          fi
          git fetch origin main
          git merge-base --is-ancestor "${GITHUB_SHA}" origin/main
      - name: Verify checks
        run: ./gradlew check
      - name: Publish to GitHub Packages
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
        run: ./gradlew publishAllPublicationsToGitHubPackagesRepository
      - name: Publish to Maven Central
        env:
          SIGNING_KEY: ${{ secrets.SIGNING_KEY }}
          SIGNING_PASSWORD: ${{ secrets.SIGNING_PASSWORD }}
          SONATYPE_USERNAME: ${{ secrets.SONATYPE_USERNAME }}
          SONATYPE_PASSWORD: ${{ secrets.SONATYPE_PASSWORD }}
        run: |
          ./gradlew publishAllPublicationsToLocalStagingRepository
          cd build/staging-deploy && zip -r ../../bundle.zip . && cd ../..
          token=$(printf '%s:%s' "${SONATYPE_USERNAME}" "${SONATYPE_PASSWORD}" | base64 -w 0)
          curl --fail --silent --show-error --request POST \
            --url 'https://central.sonatype.com/api/v1/publisher/upload?publishingType=AUTOMATIC' \
            --header "Authorization: Bearer ${token}" \
            --form 'bundle=@bundle.zip'
      - name: Verify published artifact resolves
        env:
          GITHUB_ACTOR: ${{ github.actor }}
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          version="$(awk -F= '$1 == "VERSION_NAME" { print $2 }' gradle.properties)"
          mkdir -p build
          cat > build/release-smoke.gradle.kts <<EOF
          repositories {
              maven {
                  url = uri("https://maven.pkg.github.com/torad-labs/aisdk-kotlin")
                  credentials {
                      username = System.getenv("GITHUB_ACTOR")
                      password = System.getenv("GITHUB_TOKEN")
                  }
              }
              google()
              mavenCentral()
          }
          configurations { create("smoke") }
          dependencies { "smoke"("ai.torad:torad-aisdk:${version}") }
          tasks.register("verifyPublishedArtifact") {
              doLast { configurations["smoke"].resolve().forEach { println(it.name) } }
          }
          EOF
          ./gradlew -b build/release-smoke.gradle.kts verifyPublishedArtifact --refresh-dependencies
