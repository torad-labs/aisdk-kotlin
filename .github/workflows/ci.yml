name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AI_SDK_REFERENCE_VERSION: 6.0.208
  AI_SDK_REFERENCE_COMMIT: 3270146267b1d82f07972bc40f09e9b4ee8bb9d3

jobs:
  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # `check` cross-compiles the iOS klibs on Linux, which downloads the
      # Kotlin/Native toolchain + dependencies into ~/.konan. setup-gradle only
      # caches ~/.gradle, so cache ~/.konan separately (keyed on the version
      # catalog so a Kotlin bump invalidates it). JetBrains-recommended.
      - name: Cache Kotlin/Native toolchain (~/.konan)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Fetch Vercel AI SDK v6 reference
        run: |
          mkdir -p .reference
          if ! git clone --depth 1 --branch ai@${AI_SDK_REFERENCE_VERSION} https://github.com/vercel/ai .reference/vercel-ai-sdk-ai-${AI_SDK_REFERENCE_VERSION}; then
            echo "::warning::Unable to fetch Vercel AI SDK reference; continuing so internal gates still run."
            exit 0
          fi
          actual_commit="$(git -C .reference/vercel-ai-sdk-ai-${AI_SDK_REFERENCE_VERSION} rev-parse HEAD)"
          if [ "${actual_commit}" != "${AI_SDK_REFERENCE_COMMIT}" ]; then
            echo "Reference checkout commit is ${actual_commit}, expected ${AI_SDK_REFERENCE_COMMIT}" >&2
            exit 1
          fi
      - name: Verify AI SDK reference version
        run: node tools/check-ai-sdk-reference.mjs
      - name: Verify parity ledgers
        run: node tools/generate-parity-ledger.mjs --check
      - name: Install locked Node tooling
        run: npm ci
      - name: Architecture gate (ast-grep rules + structural checks)
        run: ./node_modules/.bin/ast-grep --version && PATH="$PWD/node_modules/.bin:$PATH" bash .claude/hooks/rules/ci-gate.sh
      - name: Beta readiness gate
        run: tools/beta-readiness-check
      - name: Verify (tests + detekt + ABI + coverage)
        run: ./gradlew check
      - name: Verify publication metadata
        run: ./gradlew publishToMavenLocal

  # Apple targets cannot build on Linux; without this leg the published iOS
  # frameworks were compiled/tested nowhere (kotlin.native.ignoreDisabledTargets
  # silenced the gap on the ubuntu job).
  verify-apple:
    runs-on: macos-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # The Apple leg compiles/links three iOS targets — the heaviest
      # Kotlin/Native work in CI. Caching ~/.konan (compiler + platform libs +
      # klib caches) avoids re-downloading and re-warming it on every run.
      - name: Cache Kotlin/Native toolchain (~/.konan)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Verify Apple targets (compile all, test simulator)
        run: ./gradlew iosSimulatorArm64Test compileKotlinIosArm64 compileKotlinIosX64
      - name: Verify Swift import smoke
        run: tools/run-ios-swift-smoke
