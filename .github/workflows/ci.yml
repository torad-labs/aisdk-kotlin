name: CI

on:
  pull_request:
  push:
    branches: [main]

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true

jobs:
  verify:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6.0.3
      - uses: actions/setup-java@v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@v4.0.1
      - uses: gradle/actions/setup-gradle@v6.1.0
      - name: Fetch Vercel AI SDK v6 reference
        run: |
          mkdir -p .reference
          git clone --depth 1 --branch ai@6.0.195 https://github.com/vercel/ai .reference/vercel-ai-sdk-ai-6.0.195
      - name: Verify parity ledgers
        run: node tools/generate-parity-ledger.mjs --check
      - name: Verify tests
        run: ./gradlew allTests
      - name: Verify publication metadata
        run: ./gradlew publishToMavenLocal
