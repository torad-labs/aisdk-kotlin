name: CI

on:
  pull_request:
  push:
    branches: [main]
  schedule:
    - cron: "17 8 * * *"

permissions:
  contents: read

env:
  FORCE_JAVASCRIPT_ACTIONS_TO_NODE24: true
  AI_SDK_REFERENCE_VERSION: 6.0.208
  AI_SDK_REFERENCE_COMMIT: 3270146267b1d82f07972bc40f09e9b4ee8bb9d3
  # Update AST_GREP_SHA256 together with AST_GREP_VERSION; the package.json drift-check below enforces version consistency.
  AST_GREP_VERSION: 0.42.1
  AST_GREP_SHA256: 5de8b87cba67fc8dc3e239d54b6484802ad745a7ae3de76be4fe89661dc52657

jobs:
  reference-freshness:
    runs-on: ubuntu-latest
    timeout-minutes: 15
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - name: Fetch Vercel AI SDK v6 reference
        id: fetch_reference
        run: |
          mkdir -p .reference
          if ! git clone --depth 1 --branch ai@${AI_SDK_REFERENCE_VERSION} https://github.com/vercel/ai-nonexistent-fr04-probe .reference/vercel-ai-sdk-ai-${AI_SDK_REFERENCE_VERSION}; then
            echo "::warning::Unable to fetch Vercel AI SDK reference; skipping freshness/parity checks so internal gates still run."
            echo "available=false" >> "$GITHUB_OUTPUT"
            exit 0
          fi
          actual_commit="$(git -C .reference/vercel-ai-sdk-ai-${AI_SDK_REFERENCE_VERSION} rev-parse HEAD)"
          if [ "${actual_commit}" != "${AI_SDK_REFERENCE_COMMIT}" ]; then
            echo "Reference checkout commit is ${actual_commit}, expected ${AI_SDK_REFERENCE_COMMIT}" >&2
            exit 1
          fi
          echo "available=true" >> "$GITHUB_OUTPUT"
      - name: Verify AI SDK reference version
        if: steps.fetch_reference.outputs.available == 'true'
        run: node tools/check-ai-sdk-reference.mjs
      - name: Verify parity ledgers
        if: steps.fetch_reference.outputs.available == 'true'
        run: node tools/generate-parity-ledger.mjs --check

  verify:
    runs-on: ubuntu-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
        with:
          fetch-depth: 0
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: android-actions/setup-android@40fd30fb8d7440372e1316f5d1809ec01dcd3699 # v4.0.1
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # `check` cross-compiles the iOS klibs on Linux, which downloads the
      # Kotlin/Native toolchain + dependencies into ~/.konan. setup-gradle only
      # caches ~/.gradle, so cache ~/.konan separately (keyed on the version
      # catalog so a Kotlin bump invalidates it). JetBrains-recommended.
      - name: Cache Kotlin/Native toolchain (~/.konan)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Cache ast-grep binary
        id: cache_ast_grep
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: .tools/ast-grep/${{ env.AST_GREP_VERSION }}
          key: ast-grep-${{ runner.os }}-${{ env.AST_GREP_VERSION }}
      - name: Install ast-grep binary
        run: |
          set -euo pipefail
          package_version="$(node -p "require('./package.json').devDependencies['@ast-grep/cli']")"
          if [ "$package_version" != "$AST_GREP_VERSION" ]; then
            echo "AST_GREP_VERSION=$AST_GREP_VERSION does not match package.json @ast-grep/cli=$package_version" >&2
            exit 1
          fi

          install_dir="$PWD/.tools/ast-grep/$AST_GREP_VERSION"
          mkdir -p "$install_dir"
          if [ ! -x "$install_dir/ast-grep" ]; then
            tmp="$(mktemp -d)"
            trap 'rm -rf "$tmp"' EXIT
            curl -fsSL \
              "https://github.com/ast-grep/ast-grep/releases/download/${AST_GREP_VERSION}/app-x86_64-unknown-linux-gnu.zip" \
              -o "$tmp/ast-grep.zip"
            echo "$AST_GREP_SHA256  $tmp/ast-grep.zip" | sha256sum -c -
            unzip -q "$tmp/ast-grep.zip" -d "$tmp/extract"
            install -m 755 "$tmp/extract/ast-grep" "$install_dir/ast-grep"
          fi

          echo "$install_dir" >> "$GITHUB_PATH"
          "$install_dir/ast-grep" --version
      - name: Architecture gate (ast-grep rules + structural checks)
        id: architecture_gate
        continue-on-error: true
        run: ast-grep --version && bash .claude/hooks/rules/ci-gate.sh
      - name: Hook self-tests
        id: hook_self_tests
        continue-on-error: true
        run: |
          python3 .claude/hooks/tests/test_kotlin_antipattern_policy.py
          python3 .claude/hooks/tests/test_codex_hook_adapter.py
          python3 .claude/hooks/tests/test_fleet_protocol_policy.py
          python3 .claude/hooks/tests/test_rule_selfcheck_policy.py
      - name: Install locked Node tooling
        run: npm ci
      - name: Beta readiness gate
        id: beta_readiness
        continue-on-error: true
        run: tools/beta-readiness-check
      - name: Verify (tests + detekt + ABI + coverage)
        id: gradle_check
        continue-on-error: true
        run: ./gradlew check
      - name: Verify publication metadata
        id: publish_to_maven_local
        continue-on-error: true
        run: ./gradlew publishToMavenLocal
      - name: Summarize verify gates
        if: always()
        run: |
          gates=(
            "architecture_gate|Architecture gate (ast-grep rules + structural checks)|${{ steps.architecture_gate.outcome }}"
            "hook_self_tests|Hook self-tests|${{ steps.hook_self_tests.outcome }}"
            "beta_readiness|Beta readiness gate|${{ steps.beta_readiness.outcome }}"
            "gradle_check|Verify (tests + detekt + ABI + coverage)|${{ steps.gradle_check.outcome }}"
            "publish_to_maven_local|Verify publication metadata|${{ steps.publish_to_maven_local.outcome }}"
          )

          failed=0
          printf '| Step id | Gate | Outcome |\n'
          printf '| --- | --- | --- |\n'
          for gate in "${gates[@]}"; do
            IFS='|' read -r step_id name outcome <<< "$gate"
            printf '| `%s` | %s | %s |\n' "$step_id" "$name" "$outcome"
            if [ "$outcome" != "success" ]; then
              failed=1
            fi
          done

          exit "$failed"
      - name: Assert verify gate ledger
        if: always()
        run: |
          node tools/assert-expected-gates.mjs verify \
            "architecture-gate=${{ steps.architecture_gate.outcome }}" \
            "hook-self-tests=${{ steps.hook_self_tests.outcome }}" \
            "beta-readiness=${{ steps.beta_readiness.outcome }}" \
            "gradle-check=${{ steps.gradle_check.outcome }}" \
            "publish-to-maven-local=${{ steps.publish_to_maven_local.outcome }}"

  # Apple targets cannot build on Linux; without this leg the published iOS
  # frameworks were compiled/tested nowhere (kotlin.native.ignoreDisabledTargets
  # silenced the gap on the ubuntu job).
  verify-apple:
    runs-on: macos-latest
    timeout-minutes: 75
    steps:
      - uses: actions/checkout@df4cb1c069e1874edd31b4311f1884172cec0e10 # v6.0.3
      - uses: actions/setup-java@be666c2fcd27ec809703dec50e508c2fdc7f6654 # v5.2.0
        with:
          distribution: temurin
          java-version: "21"
      - uses: gradle/actions/setup-gradle@50e97c2cd7a37755bbfafc9c5b7cafaece252f6e # v6.1.0
      # The Apple leg compiles/links three iOS targets — the heaviest
      # Kotlin/Native work in CI. Caching ~/.konan (compiler + platform libs +
      # klib caches) avoids re-downloading and re-warming it on every run.
      - name: Cache Kotlin/Native toolchain (~/.konan)
        uses: actions/cache@27d5ce7f107fe9357f9df03efb73ab90386fccae # v5.0.5
        with:
          path: ~/.konan
          key: konan-${{ runner.os }}-${{ hashFiles('gradle/libs.versions.toml') }}
          restore-keys: konan-${{ runner.os }}-
      - name: Verify Apple targets (compile all, test simulator)
        id: apple_targets
        run: ./gradlew iosSimulatorArm64Test compileKotlinIosArm64 compileKotlinIosX64
      - name: Verify Swift import smoke
        id: swift_import_smoke
        env:
          REQUIRE_REAL_SMOKE: "1"
        run: tools/run-ios-swift-smoke
      - name: Assert verify-apple gate ledger
        if: always()
        run: |
          node tools/assert-expected-gates.mjs verify-apple \
            "apple-targets=${{ steps.apple_targets.outcome }}" \
            "swift-import-smoke=${{ steps.swift_import_smoke.outcome }}"
