name: Bug Report
description: Report incorrect behavior in the library.
labels: ["bug"]
body:
  - type: textarea
    id: description
    attributes:
      label: Description
      description: What happened?
    validations:
      required: true
  - type: textarea
    id: reproduction
    attributes:
      label: Reproduction
      description: Minimal code or steps that reproduce the issue.
    validations:
      required: true
  - type: input
    id: version
    attributes:
      label: Version
      description: Library version or commit SHA.
    validations:
      required: true
  - type: textarea
    id: environment
    attributes:
      label: Environment
      description: Kotlin, Gradle, Android/iOS/JVM target, and OS versions.
    validations:
      required: true
