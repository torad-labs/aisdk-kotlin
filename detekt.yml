# detekt configuration overlay (merged on top of detekt's default config via
# `buildUponDefaultConfig = true`). Only rules we deliberately tune live here.
#
# Cancellation-rethrow intent: the flagship anti-pattern this SDK guards against
# is a `runCatching { someSuspendCall() }` (or broad catch) that captures
# CancellationException into a Result and never rethrows it, breaking structured
# concurrency. detekt's built-in `SuspendFunSwallowedCancellation` detects that
# only with type resolution; this repo's detekt task is intentionally
# classpath-less over raw KMP source dirs, so enabling that built-in here is an
# inert comment, not a gate. GH-16 removes it; GH-21 may re-enable it only with a
# classpath-aware detekt lane that proves the rule fires.
#
# The guardrails that DO run today are: the custom
# `torad-aisdk.NoRunCatchingInSuspendFunction` rule below, `SwallowedException`
# with CancellationException deliberately NOT in `ignoredExceptionTypes`, the
# cancellation tests, and review.
coroutines:
  # Built-in mirror of the ast-grep `no-globalscope` rule (off by default in detekt).
  GlobalCoroutineUsage:
    active: true
exceptions:
  SwallowedException:
    active: true
    # CancellationException intentionally NOT listed here: swallowing it breaks
    # structured-concurrency cancellation, so detekt should flag it.
    ignoredExceptionTypes:
      - 'InterruptedException'
      - 'MalformedURLException'
      - 'NumberFormatException'
      - 'ParseException'
    allowedExceptionNameRegex: '_|(ignore|expected).*'
  ThrowingExceptionsWithoutMessageOrCause:
    active: true

# --- Custom ruleset: the project's architectural tenets (see the :detekt-rules module) ---
# Each rule mirrors an ast-grep PreToolUse hook rule, so the same invariant is enforced in
# the IDE (detekt plugin) + `./gradlew check` for every developer, not only Claude's edits.
# See docs/enforcement-layers.md. Pre-existing hits are grandfathered via detekt-baseline.xml.
torad-aisdk:
  NoNotNullAssertion:
    active: true
  NoJsonContainerForceCast:
    active: true
  NoInlineJsonInstance:
    active: true
  NoDeferredWiringComment:
    active: true
  NoConsoleOutputInLibrary:
    active: true
    # A library must not write to the console; tests legitimately may.
    excludes: ['**/commonTest/**', '**/jvmTest/**']
  NoFloatEqualityComparison:
    active: true
  PreferTypedErrorOverErrorCall:
    active: true
  PreferTypedErrorOverCheckNotNull:
    active: true
  PreferTypedErrorOverGenericThrow:
    active: true
  NoRunCatchingInSuspendFunction:
    active: true
