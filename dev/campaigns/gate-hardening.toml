# Campaign: gate-hardening + beta-release (concept #942 manifest)
# THE MANIFEST IS THE MEMORY. Statuses live HERE and only here:
#   todo | in_flight | done (builder reports complete) | verified (orchestrator independently verified)
# Nothing closes outside this file. Honesty-reconciles are APPENDED as
# `reconcile = "..."` fields, never silently edited. Commits reference item ids.
# Full rationale/provenance: docs/gate-hardening-backlog.md (narrative record —
# no statuses there). Fleet adaptation of #942: implementer = aisdk-builder
# (codex via torad-fleet) in the Sonnet slot; builder commits locally (pre-commit
# gates run in its session), NEVER pushes — the orchestrator's reviewed push is
# the single publication gate point. Enforced by fleet_protocol_policy hooks.
#
# DISPATCH TEMPLATE (every fleet sendMessage carries): (1) item id(s) + full
# item text (title = resume pointer); (2) law-sheet deltas for the slice;
# (3) writable-scope fence (exact files/dirs); (4) premise-check order — verify
# claims against the repo first, wrong premise is REPORTED not obeyed;
# (5) the item's verify field = the acceptance the report must demonstrate;
# (6) report format: id, SHA, files, verification output, QUEUE state.
# Waves: max 2-3 FILE-DISJOINT items; shared-file items are a sequential lane.
# Safety: worktree-not-stash; no bypass; builder reports before amending;
# orchestrator commits ALWAYS name pathspecs (git commit <paths> -m ...) —
# bare `git commit` sweeps the shared index (learned 978502d, both roles now).

[campaign]
name = "gate-hardening-beta-release"
started = "2026-07-02"
plan_of_record = "docs/gate-hardening-backlog.md"
done_definition = "every item verified (or operator-vetoed); fully-green CI at tip; RR-06 canary green after tag"

