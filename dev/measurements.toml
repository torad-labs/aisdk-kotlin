# dev/measurements.toml — the single home for measured project numbers.
#
# WHAT THIS IS: a measurements ledger for coverage, gate latency, hook-suite
# counts, and other hardening metrics. Every measured number lives here with
# provenance; docs and plans reference ledger keys instead of restating values.
#
# WHY: copied numbers rot independently. HD-04 found a stale coverage comment
# that was mistaken for a live measurement. One home plus key references gives
# every future reviewer a single reconciliation point. A doc that must mention
# a number cites its key, for example `[meas: coverage_branch_percent]`.
#
# CONVENTIONS: status = "current" | "superseded". Never delete or overwrite a
# measurement. Re-measure by superseding the current block and adding a new
# dated block; history is evidence. Unverified estimates do not belong here.
# Every entry carries date, HEAD, exact command, and tool_versions provenance.

